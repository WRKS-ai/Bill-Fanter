<style>
._3-text-chip {
  position: relative;
  overflow: hidden;
  min-height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
}

._3-text-chip .chips,
._3-text-chip .chips1,
._3-text-chip .chips3 {
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.6s ease, transform 0.6s ease;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) translateY(20px);
  width: 90%;
  max-width: 900px;
  text-align: center;
}

._3-text-chip .chips.active,
._3-text-chip .chips1.active,
._3-text-chip .chips3.active {
  opacity: 1;
  transform: translate(-50%, -50%) translateY(0);
}

._3-text-chip .chips.fade-out,
._3-text-chip .chips1.fade-out,
._3-text-chip .chips3.fade-out {
  opacity: 0;
  transform: translate(-50%, -50%) translateY(-20px);
}

/* Mobile responsiveness */
@media (max-width: 768px) {
  ._3-text-chip {
    min-height: 80px;
  }
  
  ._3-text-chip .chips,
  ._3-text-chip .chips1,
  ._3-text-chip .chips3 {
    width: 335px;
    max-width: 335px;
    padding: 0 10px;
    box-sizing: border-box;
  }
}

/* For very small screens */
@media (max-width: 375px) {
  ._3-text-chip .chips,
  ._3-text-chip .chips1,
  ._3-text-chip .chips3 {
    width: calc(100vw - 40px);
    max-width: 335px;
  }
}
</style>
